name: Linux

on:
  workflow_dispatch:
    inputs:
      OS_ARCH:
        description: "Build OS for specific architecture (arch, debian, ubuntu)"
        required: false
      DOCKER_TAG:
        description: "Please type tag of the docker image"
        required: true
        default: "latest"
  schedule:
    # 每月5号14:30分开始执行（北京时间+8）
    - cron: "30 14 5 * *"

jobs:
  docker_base_image:
    name: OS (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set DOCKER_TAG based on trigger type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DOCKER_TAG=${{ github.event.inputs.DOCKER_TAG }}" >> $GITHUB_ENV
          else
            # 定时任务传递变量为latest
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          fi
      - name: Arch Linux
        if: github.event.inputs.OS_ARCH == 'arch'
        uses: docker/build-push-action@v6
        with:
          context: ./linux
          file: ./linux/Dockerfile.arch
          platforms: amd64
          push: true
          tags: "chanzz0/arch:${{ env.DOCKER_TAG }}"
      - name: Debian
        if: github.event.inputs.OS_ARCH == 'debian'
        uses: docker/build-push-action@v6
        with:
          context: ./linux
          file: ./linux/Dockerfile.debian
          platforms: amd64
          push: true
          tags: "chanzz0/debian:${{ env.DOCKER_TAG }}"
      - name: Ubuntu
        if: github.event.inputs.OS_ARCH == 'ubuntu'
        uses: docker/build-push-action@v6
        with:
          context: ./linux
          file: ./linux/Dockerfile.ubuntu
          platforms: amd64
          push: true
          tags: "chanzz0/ubuntu:${{ env.DOCKER_TAG }}"

