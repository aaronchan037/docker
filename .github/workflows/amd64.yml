name: amd64

on:
  workflow_dispatch:
    inputs:
      save_path:
        description: "less than 2GB use release, and other use artifact"
        required: true
        default: "release"
      docker_images:
        description: "Please type Docker images name"
        required: true
        default: "alpine:latest,alpine/curl"

jobs:
  release_jobs:
    name: save release
    if: ${{ github.event.inputs.save_path == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      # 赋予写入的权限，否则无法发布release
      contents: write
    steps:
      - name: Pull Docker Images
        run: |
          images="${{ github.event.inputs.docker_images }}"
          IFS=',' read -r -a image_array <<< "$images"
          for image in "${image_array[@]}"; do
            docker pull "${image}" --platform "linux/amd64"
            image_name="${image//\//_}"
            image_name="${image_name//:/_}"
            docker save "${image}" -o "${image_name}.tar"
            gzip -f "${image_name}.tar"
          done
      - name: List generated files (debug step)
        run: |
          find $GITHUB_WORKSPACE -name "*.tar.gz"
          # 上海时区
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d %H:%M Build')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.RELEASE_NAME }}
          body: |
            ### Images
          artifacts: "${{ github.workspace }}/*.tar.gz"

  artifact_jobs:
    name: save artifact
    if: ${{ github.event.inputs.save_path == 'artifact' }}
    runs-on: ubuntu-latest
    steps:
      - name: Pull Docker Images
        run: |
          images="${{ github.event.inputs.docker_images }}"
          IFS=',' read -r -a image_array <<< "$images"
          for image in "${image_array[@]}"; do
            docker pull "${image}" --platform "linux/amd64"
            image_name="${image//\//_}"
            image_name="${image_name//:/_}"
            docker save "${image}" -o "${image_name}.tar"
            gzip -f "${image_name}.tar"
          done
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: ${{ github.workspace }}/*.tar.gz
          # 将保留天数设置为 7 天 最多可设置90天
          retention-days: 7
