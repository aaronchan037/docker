name: Release

on:
  workflow_dispatch:

jobs:
  build_docker_images:
    name: TeXLive (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build save images and gzip files
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file ./test/Dockerfile \
            --tag chanzz0/texlive:test \
            --push \
            ./test
          docker save "chanzz0/texlive:test" -o texlive.tar
          gzip -f texlive.tar
      - name: List generated files (debug step)
        run: |
          find $GITHUB_WORKSPACE -name "*.tar.gz"
          # 以上海时区作为发布时间
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d Build Docker images')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.RELEASE_NAME }}
          body: |
            ### Docker images
          artifacts: "${{ github.workspace }}/*.tar.gz"
