name: amd64 (less than 2GB)

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: "Please type Docker images name"
        required: true
        default: "alpine:latest,alpine/curl,busybox:stable-glibc"

jobs:
  pull_and_package:
    name: save docker image
    runs-on: ubuntu-latest
    permissions:
      # 赋予写入的权限，否则无法发布release
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Pull Docker Images and Package
        run: |
          images="${{ github.event.inputs.docker_images }}"
          IFS=',' read -r -a image_array <<< "$images"
          for image in "${image_array[@]}"; do
            docker pull "${image}" --platform "linux/amd64"
            image_name="${image//\//_}"
            image_name="${image_name//:/_}"
            docker save "${image}" -o "${image_name}.tar"
            gzip -f "${image_name}.tar"
          done
      - name: List generated files (debug step)
        run: |
          find $GITHUB_WORKSPACE -name "*.tar.gz"
          # 上海时区
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d %H:%M Build')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.RELEASE_NAME }}
          body: |
            ### Images
          artifacts: "${{ github.workspace }}/*.tar.gz"
