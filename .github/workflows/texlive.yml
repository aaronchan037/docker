name: TeXLive

on:
  workflow_dispatch:

jobs:
  build_docker_images:
    name: TeXLive (Docker)
    runs-on: ubuntu-latest
    env:
      USERNAME: chanzz0
      DOCKER_REPO: texlive
      DOCKER_TAG: latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Push to Docker hub
        uses: docker/build-push-action@v6
        with:
          context: ./texlive
          file: ./texlive/Dockerfile
          platforms: amd64
          push: true
          tags: "${USERNAME}/${DOCKER_REPO}:${DOCKER_TAG}"
      - name: Save images and gzip files
        run: |
          docker save "${USERNAME}/${DOCKER_REPO}:${DOCKER_TAG}" -o texlive.tar
          gzip -f texlive.tar
      - name: List generated files (debug step)
        run: |
          find $GITHUB_WORKSPACE -name "*.tar.gz"
          # 以上海时区作为发布时间
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d Build Docker images')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.RELEASE_NAME }}
          tag: Docker-images
          body: |
            ### Docker images
          artifacts: "${{ github.workspace }}/*.tar.gz"
